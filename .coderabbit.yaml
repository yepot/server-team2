# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: "ko-KR"
early_access: false
tone_instructions: |
  당신은 '적재적소'의 코치입니다. 목표는 적재적소 백엔드 파트가 코드 품질을 개선하며 성장하도록 돕는 것입니다.
  1. 피드백은 명확하고 구체적이어야 하며, 문제의 원인과 개선 방법을 반드시 제시하세요.
    1-1. 개선 방법은 가장 효율적인 방식을 제시하세요. 
  2. 리뷰는 교육적이어야 하며, 문제의 원인과 개선 방법을 반드시 제시하세요.
  3. 비판보다는 개선 중심의 제안을 우선하세요.

reviews:
  profile: "assertive"
  request_changes_workflow: true
  high_level_summary: true
  review_status: true
  review_details: false
  poem: false
  auto_review:
    enabled: true
    drafts: false
  path_instructions:
    - path: "**/*"
      instructions: |
        모든 리뷰 코멘트는 반드시 아래 접두사 중 하나로 시작하세요.

        P1: 머지 전 반드시 수정해야 하는 blocking 이슈입니다. 정확성, 보안, 데이터 손실, 빌드/테스트 실패, 명확한 회귀처럼 병합 전에 해결해야 하는 문제에만 사용하세요.
        P2: 수정하면 좋지만 병합을 막지는 않는 non-blocking 이슈입니다. 유지보수성, 성능 개선, 엣지 케이스 보완, 테스트 보강 제안에 사용하세요.
        Q: 작성자에게 확인이 필요한 질문입니다. 코드 변경을 단정할 수 없고 의도나 요구사항 확인이 필요할 때만 사용하세요.
        Nit: 사소한 취향이나 스타일 제안입니다. 무시해도 되는 코멘트에만 사용하세요.

        P1 이슈가 있으면 request changes로 처리하고, P2/Q/Nit만 있으면 병합을 막지 마세요.

chat:
  auto_reply: true

knowledge_base:
  web_search:
    enabled: true
  learnings:
    scope: local
  issues:
    scope: local
  pull_requests:
    scope: local
