name: CI/CD

on:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: JDK 17 설정
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: application-prod.yml 생성 (GitHub Secrets 사용)
        env:
          APPLICATION_PROD_YML: ${{ secrets.APPLICATION_PROD_YML }}
        run: |
          mkdir -p src/main/resources
          printf '%s' "$APPLICATION_PROD_YML" > src/main/resources/application-prod.yml
          test -s src/main/resources/application-prod.yml

      - name: Gradle 빌드
        run: |
          chmod +x ./gradlew
          ./gradlew clean bootJar -x test

      - name: Docker 이미지 빌드 & Docker Hub 푸시
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          echo "$DOCKERHUB_TOKEN" | docker login \
            -u "$DOCKERHUB_USERNAME" \
            --password-stdin

          docker build -t "$DOCKERHUB_USERNAME/hackathon:latest" .
          docker push "$DOCKERHUB_USERNAME/hackathon:latest"

      - name: EC2 접속 & 재배포
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login \
              -u "${{ secrets.DOCKERHUB_USERNAME }}" \
              --password-stdin

            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/hackathon:latest
            docker stop hackathon-app || true
            docker rm hackathon-app || true

            docker run -d \
              --name hackathon-app \
              --network host \
              --restart unless-stopped \
              -e OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
              --env-file /home/ubuntu/.env \
              ${{ secrets.DOCKERHUB_USERNAME }}/hackathon:latest
