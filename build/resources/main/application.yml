spring:
  application:
    name: hackathon
  profiles:
    active: local
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100

server:
  forward-headers-strategy: framework

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

jwt:
  secret: ${JWT_SECRET:temporary-local-secret-key-change-this-in-real-env-32bytes!!}
  access-token-expiration: 3600000
  refresh-token-expiration: 1209600000
